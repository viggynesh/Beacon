services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "${CLICKHOUSE_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-beacon}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-beacon}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-beacon}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - beacon

  localstack:
    image: localstack/localstack:3.4
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    environment:
      SERVICES: s3,sqs,kinesis
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - beacon

  api:
    build:
      context: backend/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_DSN: ${CLICKHOUSE_DSN}
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - beacon

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - beacon

  drift:
    build:
      context: backend/drift
      dockerfile: Dockerfile
    environment:
      CLICKHOUSE_DSN: ${CLICKHOUSE_DSN:-clickhouse://beacon:beacon@clickhouse:9000/beacon}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-}
      DRIFT_INTERVAL: ${DRIFT_INTERVAL:-5m}
      DRIFT_THRESHOLD: ${DRIFT_THRESHOLD:-0.2}
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - beacon

volumes:
  clickhouse_data:
  localstack_data:

networks:
  beacon:
    driver: bridge
